<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker — Pinned Tasks</title>
</head>
<body>
<div class="tracker-card">
  <div class="tracker-header">
    <h1>📌 Pin & Flow</h1>
    <p>Закреплённые задачи не зависят от фильтра</p>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="taskInput" placeholder="Новая задача... нажмите Enter" autocomplete="off">
    </div>
    <div id="inputError" class="error-hint"></div>
  </div>

  <div class="tasks-container">
    <div class="section">
      <div class="section-title">📌 Закреплённые задачи</div>
      <div id="pinnedList" class="tasks-list"></div>
    </div>

    <div class="section">
      <div class="section-title">📋 Все задачи</div>
      <div id="allTasksList" class="tasks-list"></div>
    </div>
  </div>

  <div class="footer-note">
    🔍 Фильтр по началу названия • 📌 Закрепление перемещает задачу
  </div>
</div>
</body>
</html>
